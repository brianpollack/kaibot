name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:

  # ── macOS DMG (x64 + arm64) ──────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish mac
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing — optional; build succeeds unsigned if secrets are absent
          CSC_LINK: ${{ secrets.MAC_CERT_FILE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          # Notarization — optional; only runs when all three Apple secrets are set
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Decode the base64-encoded .p12 cert only when the secret is present
          if [ -n "$CSC_LINK" ]; then
            echo "$CSC_LINK" | base64 --decode > mac-cert.p12
            export CSC_LINK=$(pwd)/mac-cert.p12
          else
            unset CSC_LINK
          fi
          npm run dist:mac

  # ── Windows NSIS installer (x64 + arm64) ─────────────────────────────────
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Windows cert
        # Only write the cert file when the secret is present
        if: ${{ secrets.WIN_CERT_BASE64 != '' }}
        shell: pwsh
        env:
          WIN_CERT_BASE64: ${{ secrets.WIN_CERT_BASE64 }}
        run: |
          [IO.File]::WriteAllBytes("win-cert.p12", [Convert]::FromBase64String($env:WIN_CERT_BASE64))

      - name: Build and publish win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Point to the decoded cert only when it was written above
          CSC_LINK: ${{ secrets.WIN_CERT_BASE64 != '' && 'win-cert.p12' || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: npm run dist:win
