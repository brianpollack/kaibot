name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:

  # ── macOS DMG (x64 + arm64) ──────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    environment: dist

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish mac
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing — optional; build succeeds unsigned if secrets are absent
          CSC_LINK: ${{ secrets.MAC_CERT_FILE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          # Notarization — optional; only runs when all three Apple secrets are set
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Decode the base64-encoded .p12 cert only when the secret is present
          if [ -n "$CSC_LINK" ]; then
            echo "$CSC_LINK" | base64 --decode > mac-cert.p12
            export CSC_LINK=$(pwd)/mac-cert.p12
          else
            unset CSC_LINK
          fi
          npm run dist:mac

  # ── Windows NSIS installer — build, sign via SSL.com eSigner, publish ─────
  build-win:
    runs-on: windows-latest
    environment: dist

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (unsigned)
        shell: pwsh
        env:
          # Prevent electron-builder from looking for a local cert
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build:all; npx electron-builder --win --publish never

      - name: Find installer path
        id: find_exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem release\*.exe | Select-Object -First 1 -ExpandProperty FullName
          echo "path=$exe" >> $env:GITHUB_OUTPUT
          echo "Found installer: $exe"

      - name: Sign with SSL.com eSigner
        uses: SSLcom/esigner-codesign@v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.ES_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ steps.find_exe.outputs.path }}
          malware_block: "false"
          override: "true"
          environment_name: "PROD"

      - name: Upload signed installer to GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = "${{ steps.find_exe.outputs.path }}"
          $blockmap = "$exe.blockmap"
          gh release upload ${{ github.ref_name }} $exe --clobber
          if (Test-Path $blockmap) {
            gh release upload ${{ github.ref_name }} $blockmap --clobber
          }
